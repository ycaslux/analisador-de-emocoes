<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Analisador de Texto</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 550px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        textarea {
            width: 100%;
            height: 80px;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 10px;
            padding: 8px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-analisar {
            width: 100%;
            background-color: #007bff;
            color: white;
        }

        .btn-excluir {
            background-color: #dc3545;
            color: white;
            margin-top: 5px;
        }

        #resultado {
            margin-top: 15px;
            padding: 10px;
            background: #f1f1f1;
            border-radius: 5px;
        }

        .item-historico {
            margin-top: 10px;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .data {
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Analisador de Texto</h1>

    <textarea id="texto" placeholder="Digite seu texto aqui..."></textarea>
    <button class="btn-analisar" onclick="enviarTexto()">Analisar</button>

    <h3>Resultado</h3>
    <div id="resultado"></div>

    <h3>Histórico</h3>
    <div id="historico"></div>
</div>

<script>

async function enviarTexto() {

    const texto = document.getElementById("texto").value;

    const resposta = await fetch("http://127.0.0.1:5000/analise", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ texto: texto })
    });

    const dados = await resposta.json();

    if (resposta.ok) {

        let cor = "black";
        if (dados.sentimento === "positivo") cor = "green";
        if (dados.sentimento === "negativo") cor = "red";

        document.getElementById("resultado").innerHTML =
            "Palavras: " + dados.quantidade_palavras + "<br>" +
            "Caracteres: " + dados.quantidade_caracteres + "<br>" +
            "Sentimento: <span style='color:" + cor + "'>" + dados.sentimento + "</span>";

        carregarHistorico();
    }
}

async function carregarHistorico() {

    const resposta = await fetch("http://127.0.0.1:5000/analises");
    const dados = await resposta.json();

    const historicoDiv = document.getElementById("historico");
    historicoDiv.innerHTML = "";

    dados.forEach(item => {

        let cor = "black";
        if (item.sentimento === "positivo") cor = "green";
        if (item.sentimento === "negativo") cor = "red";

        historicoDiv.innerHTML += `
            <div class="item-historico">
                <strong>ID:</strong> ${item.id} <br>
                <strong>Texto:</strong> ${item.texto} <br>
                <strong>Sentimento:</strong> 
                <span style="color:${cor}">${item.sentimento}</span><br>
                <span class="data">${item.data_hora}</span><br>
                <button class="btn-excluir" onclick="deletar(${item.id})">
                    Excluir
                </button>
            </div>
        `;
    });
}

async function deletar(id) {

    await fetch(`http://127.0.0.1:5000/analise/${id}`, {
        method: "DELETE"
    });

    carregarHistorico();
}

window.onload = carregarHistorico;

</script>

</body>
</html>
